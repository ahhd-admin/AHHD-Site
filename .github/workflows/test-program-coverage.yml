name: Test ACHC Program Coverage Audit

on:
  workflow_dispatch:

jobs:
  test-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ./scrapers
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run full ACHC coverage diagnostic
        working-directory: ./scrapers
        env:
          GOOGLE_SHEETS_WEB_APP_URL: ${{ secrets.GOOGLE_SHEETS_WEB_APP_URL }}
          LIMIT_LOCATIONS: 0
          TEST_MODE: true
          TRIGGER_STATE: Texas
          ENABLE_COVERAGE_DIAGNOSTIC: true
          COVERAGE_JSON_PATH: coverage_summary.json
        run: |
          python run_scraper_and_merge.py

      - name: Upload coverage JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: achc-coverage-summary
          path: scrapers/coverage_summary.json
