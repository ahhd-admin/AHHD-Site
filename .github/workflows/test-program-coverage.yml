name: Test ACHC Program Coverage Audit

on:
  workflow_dispatch:

jobs:
  test-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ./scrapers
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run full ACHC coverage diagnostic
        working-directory: ./scrapers
        env:
          GOOGLE_SHEETS_WEB_APP_URL: ${{ secrets.GOOGLE_SHEETS_WEB_APP_URL }}
          LIMIT_LOCATIONS: 0
          TEST_MODE: true
          TRIGGER_STATE: Texas
          ENABLE_COVERAGE_DIAGNOSTIC: true
          COVERAGE_JSON_PATH: coverage_summary.json
          ENABLE_ZERO_RESULT_DEBUG: true
          ZERO_RESULT_DEBUG_DIR: debug_artifacts
          ZERO_RESULT_DEBUG_TARGETS: Home Health,Community Retail
          PROGRAM_SELECTION_WAIT_MS: 2500
          STATE_SELECTION_WAIT_MS: 1500
          PRE_SEARCH_WAIT_MS: 2500
          POST_SEARCH_WAIT_MS: 5000
        run: |
          python run_scraper_and_merge.py

      - name: Upload coverage JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: achc-coverage-summary
          path: scrapers/coverage_summary.json

      - name: Upload zero-result debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: achc-zero-result-debug
          path: scrapers/debug_artifacts
          if-no-files-found: warn
