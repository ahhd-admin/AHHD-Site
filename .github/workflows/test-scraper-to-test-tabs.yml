name: Test ACHC Raw Dump to Test Tab

on:
  workflow_dispatch:

jobs:
  test-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./scrapers
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run raw-only ACHC full dump and push to test tab
        working-directory: ./scrapers
        env:
          GOOGLE_SHEETS_WEB_APP_URL: ${{ secrets.GOOGLE_SHEETS_WEB_APP_URL }}
          LIMIT_LOCATIONS: 0
          TEST_MODE: true
          TRIGGER_STATE: Texas
        run: |
          python run_scraper_and_merge.py
